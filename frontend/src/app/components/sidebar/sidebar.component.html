<div class="sidebar">
  <div class="logo">PedidosApp</div>
  <ul>
    <li *ngFor="let item of menuItems">
      <a [routerLink]="item.link" routerLinkActive="active">
        <span>{{item.icon}}</span> {{item.label}}
      </a>
    </li>
  </ul>
  <div class="logout" (click)="logout()">🚪 Cerrar sesión</div>
</div>
